<script type="text/javascript">
//12_gtm_gui

/* CUSTOM FUNCTIONS FOR P5LIVE */
// keep fullscreen if window resized
function windowResized() {
	resizeCanvas(windowWidth, windowHeight);
}

// custom ease function
function ease(iVal, oVal, eVal){
	return oVal += (iVal - oVal) * eVal;
}

// processing compatibility
function println(msg){
	print(msg);
}


//p5='2'
let direction;
let strength;

//img upload variables
let img;
let input;

let layers=[]

//grid variables
let grid = [];
let size = 20;
let cols, rows;

let baseSpeed=0.5;
let sliderSpeed=0;
let colorPicker

let video;
let isVideo = false;


async function setup() {
	createCanvas(windowWidth, windowHeight);
	tempLayer = createGraphics(width, height)
	cursor('crosshair');
	
	initGUI() // see function below 
	initStyles()
}

function draw() {
	background(colorPicker.color());

	for(let l of layers){
		image(l,0,0)
	}
	
	drawboard()
	image(tempLayer,0,0)

}

function drawboard(){
	if (!img) {return;}
		
	tempLayer.clear()
	
	let rad=radius.value();
	let speedS=speedSlider.value();
	updateGrid(rad, speedS);
	renderGrid();
}


// process selected file 
function fileHandle(file) {
	if (file.type === 'image') {
		loadImage(file.data, loaded => {
			img = loaded;
			img.loadPixels();
			resGrid()
			buildGrid();
			console.log("image loaded", img);
		});
	} else {
		img = null;
	}
}

function buildGrid() {
	size=sizeSlider.value()
	grid = [];
	cols= floor(width/size);								//columns of grid
	rows= floor(height/size);								//rows of grid
	//print(cols*rows)			//
	
	let xStep=width/cols;									//width between columns
	let yStep= height/rows; 								//height between rows

	for (let i = 0; i < cols; i++) {
		for (let j = 0; j <rows; j++) {

			let x= i*xStep;
			let y= j*yStep;
			
			let imgX=floor(map(x,0,width,0,img.width));
			let imgY=floor(map(y,0,height,0,img.height));
			
			let pixelIndex = (imgX + imgY * img.width) * 4;		//counts through pixels of img
		
			grid.push({ 									//saves pixel data in array
				x: x,										//original x location of pixel
				y: y,										//original y location of pixel
				ox:x,										//offset x location of pixel
				oy:y,										//offset y location of pixel
				w:xStep,									//width of pixel
				h:yStep,									//height of pixel
				r : img.pixels[pixelIndex],
				g : img.pixels[pixelIndex + 1],
				b : img.pixels[pixelIndex + 2],
			});
		}
	}
}


function resGrid(){
	size=sizeSlider.value()
	resolution=floor(width/size)*floor(height/size);
	labelSize.html(`${resolution} pixels`)
}


function renderGrid(){
	img.loadPixels();
	for (let i = 0; i < cols; i++) {
		for (let j = 0; j < rows; j++) {
		let gridIndex = i + j * cols; 						//counts through cells
		let cell = grid[gridIndex]; 						//all cells
		
	
		tempLayer.fill(cell.r,cell.g,cell.b);
		tempLayer.noStroke();
		tempLayer.rect(cell.x, cell.y, cell.w, cell.h);				//draw the cells with color from img
		}
	}	
}


function updateGrid(rad,speedS){
	for (let i = 0; i < grid.length; i++) {
			
		let cell= grid[i];  								//creates cell from each pixel
			
		let d= floor(dist(mouseX, mouseY, cell.x,cell.y))	//gets distance from mouse to each cell
		
		let radius=10*rad;									//RADIUS
		let speedRadius= dist(mouseX,mouseY, cell.x,cell.y);//mapping speed difference over distance
		let influence=constrain(radius/max(d,1),0,10);		
		influence=influence*influence;						//makes the speedfalloff more organic?
	
			
		let dirX=map(speedS,0,255,-1,1)						//make it value from -1 to 1
		
		
		
		let speed=baseSpeed*influence*dirX;	//SPEED
		
		if (mouseIsPressed && !mouseIsPanel()){
			cell.x = cell.x + speed;
		}
	}
}



function mouseInfluence(cell,speedS){
	let radius= map(speedS, 0,5,20,200)
	let d= dist(mouseX, mouseY, cell.x,cell.y)
	return map(d, 0, radius, 0, 255);
}

function resetGrid(){
	for (let i = 0; i < grid.length; i++) {
		let cell= grid[i];
		cell.x=cell.ox;
		cell.y=cell.oy;
	}
}

function newComposition(){
	img=null;
	grid=[]
	resetGrid();
	layers=[];
	tempLayer.clear();
	clear();
}

function initGUI() { 
  // by never declaring vars above, they become global.. js hack! 
  // create generic div (html container)  
  guiHolder = createDiv()
 
    .class('guiHolder') // add class for styling via CSS  
 
	// TITLE dragable
	titleBar = createDiv('FRAGMENT MORPHER') 
    .parent(guiHolder) 
    .class('titlebar') 
    .draggable(guiHolder) // can drag the parent div 
    
    
    //COLORPICKER
	labelSize = createDiv('Background Color') 
    .parent(guiHolder)
    .class('label')
 	colorPicker = createColorPicker('#ffffff')
    .parent(guiHolder) 
    
 
 
	//SIZE
	labelSize = createDiv('Size') 
    .parent(guiHolder)
    .class('label')
 
	sizeSlider = createSlider(10, 50, size, 1)
    .parent(guiHolder) 
    .class('slider')
    .input(resGrid)
    
    
    
	//SPEED - DIRECTION
	createDiv('Direction') 
    .parent(guiHolder) // place inside gui div  
    .class('label') // class for CSS  
 
	speedSlider = createSlider(0, 255, 150, 1)
    .parent(guiHolder) //  place inside gui div  
    .class('slider') // class for CSS  
    
    
	//RADIUS
	createDiv('Radius') 
    .parent(guiHolder) // place inside gui div  
    .class('label') // class for CSS  
    
	 radius = createSlider(0, 255, 150, 1) // use mySlider.value() * _maxVal_ 
    .parent(guiHolder) //  place inside gui div  
    .class('slider') // class for CSS  
    
    
    //IMAGE
   	createDiv() 
	input = createFileInput(fileHandle)
    .parent(guiHolder) //  place inside gui div  
    .class('hiddenFile') // class for CSS  
    
    fileBtn = createButton('Choose Image');
    fileBtn
    .parent(guiHolder)
    .class('button');
    fileBtn.mousePressed(() => {
    	input.elt.click(); // opens file picker
    	});
    
    //ADD LAYER
    createDiv() 
    .parent(guiHolder)
    .class('label')
    
	 addBtn=createButton('Add Layer')
	 
    .parent(guiHolder)
    .class('button');
    addBtn.mousePressed(addLayer)
    
    
    
    //SAVE
    createDiv() 
    .parent(guiHolder) // place inside gui div  
    .class('label')
    
	 saveBtn=createButton('Save as PNG')
	 
    .parent(guiHolder)
    .class('button');
    saveBtn.mousePressed(savePNG)
    
    // RESET
     createDiv() 
    .parent(guiHolder) // place inside gui div  
 
    
	 reset=createButton('Reset Position')
	 reset.mousePressed(buildGrid)
    .parent(guiHolder)
    .class('button')
    

   // NEW COMPOSITION
     createDiv() 
    .parent(guiHolder) // place inside gui div  
 
    
	 newComp=createButton('New Composition')
	 newComp.mousePressed(newComposition)
    .parent(guiHolder)
    .class('button')
    
    
 
 guiHolder.position(200, 200);

guiHolder.style('background', '#ffffff');
guiHolder.style('padding', '10px');
guiHolder.style('border', '1px solid black');



}

  createElement('style', `

	.titlebar{
		font-family: Helvetica, Arial, sans-serif;

	}

    .button {
      background: #eeeeee;
      border: 1px solid black;
      padding: 5px 10px;

      cursor: pointer;
    }
    
    .button:hover {
      background: #dddddd;
    }

    .label {
    	font-family: Helvetica, Arial, sans-serif;
    	margin-top: 8px;
    	font-size: 14px;
    }
    
    .slider {
      width: 100%;
      margin-top: 4px;
    }
    
    .hiddenFile {
    display: none;
    }


  `);
}
 
// avoid drawing while using panel 
function mouseIsPanel() {  
  let overPanel = true 
  let ghpos = guiHolder.position() 
  let ghsize = guiHolder.size() 
  if((mouseX <= ghpos.x || mouseX >= ghpos.x + ghsize.width) || (mouseY <= ghpos.y || mouseY >= ghpos.y + ghsize.height)) { 
    overPanel = false 
  } 
 
  return overPanel 
} 

function addLayer(){
	 let getLayer = tempLayer.get() // clone layer
        layers.push(getLayer) // add to collection of layers
        tempLayer.clear()
}
        
function savePNG(){
    	saveCanvas('myCanvas', 'png');
}
</script>

</body>
